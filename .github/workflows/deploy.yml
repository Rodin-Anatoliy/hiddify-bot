name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run Linter
        uses: golangci/golangci-lint-action@v6
        with:
          # Мы зафиксировали v1.62.2, чтобы не конфликтовать с твоим конфигом
          version: v1.62.2

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race -cover ./...

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        # Собираем из cmd/bot, как мы выяснили
        run: GOOS=linux GOARCH=amd64 go build -o bin/hiddify-bot ./cmd/bot
      - uses: actions/upload-artifact@v4
        with:
          name: hiddify-bot-binary
          path: bin/hiddify-bot

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: hiddify-bot-binary
          path: .

      - name: Prepare Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE || '' }}
          script: |
            # Останавливаем сервис, чтобы файл не был занят
            sudo systemctl stop hiddify-bot || true
            sudo mkdir -p /opt/hiddify-bot
            sudo chown -R ${{ secrets.SERVER_USER }} /opt/hiddify-bot

      - name: Copy Binary
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE || '' }}
          source: "hiddify-bot"
          target: "/opt/hiddify-bot/"

      - name: Permissions and Start
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE || '' }}
          script: |
            # Тот самый chmod, который ты вводил руками — теперь он тут навсегда
            chmod +x /opt/hiddify-bot/hiddify-bot
            sudo systemctl start hiddify-bot
            # Даем сервису время "прочихаться" и проверяем статус
            sleep 2
            sudo systemctl is-active hiddify-bot