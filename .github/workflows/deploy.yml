name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62 # Стабильная версия, которая поймет твой конфиг

  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build Binary
        # Собираем строго под Linux, чтобы избежать сюрпризов
        run: GOOS=linux GOARCH=amd64 go build -o bin/hiddify-bot main.go
      - uses: actions/upload-artifact@v4
        with:
          name: hiddify-bot-binary
          path: bin/hiddify-bot

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: hiddify-bot-binary
          path: .

      # Мы объединяем всё в один SSH сеанс для скорости и надежности
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE || '' }}
          script: |
            # 1. Останавливаем сервис
            sudo systemctl stop hiddify-bot || true
            
            # 2. Создаем папку и забираем права (если вдруг слетели)
            sudo mkdir -p /opt/hiddify-bot
            sudo chown -R ${{ secrets.SERVER_USER }}:${{ secrets.SERVER_USER }} /opt/hiddify-bot

      - name: Upload via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE || '' }}
          source: "hiddify-bot"
          target: "/opt/hiddify-bot/"

      - name: Finalize and Start
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE || '' }}
          script: |
            # Важнейший этап: возвращаем права после SCP
            chmod +x /opt/hiddify-bot/hiddify-bot
            
            # Перезапуск
            sudo systemctl restart hiddify-bot
            
            # Быстрая проверка
            sleep 1
            sudo systemctl is-active hiddify-bot