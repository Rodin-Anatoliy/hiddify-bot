# Usage:
#   make deploy                     — build and (re)start
#   docker compose logs -f bot      — tail logs
#   docker compose down             — stop

services:
  bot:
    build:
      context: .
      args:
        COMMIT: ${COMMIT:-unknown}
    image: hiddify-bot:latest
    container_name: hiddify-bot
    restart: unless-stopped

    env_file:
      - .env

    environment:
      TZ: Europe/Moscow

    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./data:/app/data

    stop_grace_period: 30s

    healthcheck:
      test: ["CMD", "pgrep", "hiddify-bot"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
