name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Run Linter
        uses: golangci/golangci-lint-action@v6
        with:
          # Версия 1.62+ стабильна, но требует отсутствия 'version' в .golangci.yml
          version: v1.62

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -race -cover ./...

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build Binary
        # Исправлено: собираем из папки cmd/bot, как у тебя в проекте
        run: GOOS=linux GOARCH=amd64 go build -o bin/hiddify-bot ./cmd/bot
      - uses: actions/upload-artifact@v4
        with:
          name: hiddify-bot-binary
          path: bin/hiddify-bot

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: hiddify-bot-binary
          path: .

      # Шаг 1: Подготовка (Останавливаем сервис ДО копирования)
      - name: Prepare Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE || '' }}
          script: |
            sudo systemctl stop hiddify-bot || true
            sudo mkdir -p /opt/hiddify-bot
            sudo chown -R ${{ secrets.SERVER_USER }} /opt/hiddify-bot

      # Шаг 2: Копирование бинарника
      - name: Copy Binary via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE || '' }}
          source: "hiddify-bot"
          target: "/opt/hiddify-bot/"

      # Шаг 3: Финальная настройка прав и запуск
      - name: Finalize and Start
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE || '' }}
          script: |
            # Принудительно ставим права на исполнение
            chmod +x /opt/hiddify-bot/hiddify-bot
            # Запускаем сервис
            sudo systemctl start hiddify-bot
            # Проверяем, что он не упал через 2 секунды
            sleep 2
            sudo systemctl is-active hiddify-bot